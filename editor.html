<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>FixelFlow 2 — 关卡编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #ccd;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 左侧关卡列表 ─────────────────────────── */
    #panel-levels {
      width: 130px;
      min-width: 130px;
      background: #111120;
      border-right: 1px solid #222244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-levels h2 {
      padding: 10px 8px 6px;
      font-size: 11px;
      color: #667;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    #group-switch {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      border-bottom: 1px solid #1a1a30;
      flex-shrink: 0;
    }
    .btn-group {
      flex: 1;
      background: #111120;
      border: 1px solid #334;
      color: #556;
      padding: 3px 0;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-family: monospace;
      transition: background 0.1s;
    }
    .btn-group:hover { background: #1a1a35; color: #889; }
    .btn-group.active { background: #1e1e45; border-color: #446; color: #aaccff; }
    #level-list {
      overflow-y: auto;
      flex: 1;
    }
    #level-list::-webkit-scrollbar { width: 4px; }
    #level-list::-webkit-scrollbar-track { background: #111120; }
    #level-list::-webkit-scrollbar-thumb { background: #334; }
    .level-item {
      padding: 5px 10px;
      cursor: pointer;
      color: #889;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .level-item:hover { background: #1a1a35; color: #aab; }
    .level-item.active { background: #1e1e45; color: #aaccff; }

    /* ── 中间画布区 ───────────────────────────── */
    #panel-canvas {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0d0d1a;
    }
    #canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #111120;
      border-bottom: 1px solid #1a1a30;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #canvas-toolbar label { color: #667; font-size: 11px; }
    #canvas-toolbar input[type=number] {
      width: 52px;
      background: #0d0d1a;
      border: 1px solid #334;
      color: #aab;
      padding: 2px 4px;
      border-radius: 3px;
    }
    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 16px;
    }
    #canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    #canvas-wrap::-webkit-scrollbar-track { background: #0d0d1a; }
    #canvas-wrap::-webkit-scrollbar-thumb { background: #334; border-radius: 3px; }
    #main-canvas {
      cursor: crosshair;
      display: block;
      image-rendering: pixelated;
    }

    /* ── 右侧属性面板 ─────────────────────────── */
    #panel-right {
      width: 240px;
      min-width: 240px;
      background: #111120;
      border-left: 1px solid #222244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-right h2 {
      padding: 10px 10px 8px;
      font-size: 11px;
      color: #667;
      letter-spacing: 1px;
      border-bottom: 1px solid #1a1a30;
      flex-shrink: 0;
    }
    #panel-right-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #panel-right-scroll::-webkit-scrollbar { width: 4px; }
    #panel-right-scroll::-webkit-scrollbar-track { background: #111120; }
    #panel-right-scroll::-webkit-scrollbar-thumb { background: #334; }

    /* 画笔颜色选择器 */
    #brush-section { margin-bottom: 12px; }
    #brush-section h3 { font-size: 11px; color: #556; margin-bottom: 6px; }
    #brush-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .brush-swatch {
      width: 24px; height: 24px;
      border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s;
    }
    .brush-swatch.active { border-color: #fff; }
    .brush-swatch.eraser {
      background: #1a1a30 !important;
      border: 2px dashed #446;
      font-size: 10px;
      color: #668;
      display: flex; align-items: center; justify-content: center;
    }
    #add-color-row {
      display: flex; gap: 4px; align-items: center; margin-top: 4px;
    }
    #new-color-input {
      width: 32px; height: 24px;
      border: none; padding: 0;
      cursor: pointer; border-radius: 3px;
    }
    #add-color-btn {
      flex: 1;
      background: #1a1a35;
      border: 1px solid #334;
      color: #aab;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }
    #add-color-btn:hover { background: #222250; }

    /* 颜色列表 */
    #colors-section h3 { font-size: 11px; color: #556; margin-bottom: 6px; }
    .color-row {
      background: #0d0d20;
      border: 1px solid #1e1e35;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
    }
    .color-row.error { border-color: #662222; background: #1a0d0d; }
    .color-row.ok    { border-color: #224422; }
    .color-row-head {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .color-dot {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
    }
    .color-hex { flex: 1; font-size: 11px; color: #aab; }
    .color-stat { font-size: 11px; color: #556; }
    .color-stat.warn { color: #cc8844; }
    .color-stat.ok   { color: #44aa66; }
    .del-color-btn {
      background: none; border: none; color: #553; cursor: pointer;
      font-size: 13px; padding: 0 2px;
    }
    .del-color-btn:hover { color: #cc4444; }
    .tank-config { margin-top: 4px; }
    .tank-config label { font-size: 10px; color: #556; display: block; margin-bottom: 2px; }
    .tank-row {
      display: flex; gap: 4px; align-items: center; margin-bottom: 3px;
    }
    .tank-row select, .tank-row input {
      background: #0d0d1a; border: 1px solid #334; color: #aab;
      padding: 1px 4px; border-radius: 3px; font-size: 11px;
    }
    .tank-row select { width: 58px; }
    .tank-row input  { width: 52px; }
    .del-tank-btn {
      background: none; border: none; color: #553; cursor: pointer; font-size: 12px;
    }
    .del-tank-btn:hover { color: #cc4444; }
    .add-tank-btn {
      font-size: 10px; background: #1a1a30; border: 1px solid #334;
      color: #889; padding: 1px 6px; border-radius: 3px; cursor: pointer;
      margin-top: 2px;
    }
    .add-tank-btn:hover { background: #222244; }

    /* 网格尺寸 */
    #grid-section { margin-bottom: 12px; }
    #grid-section h3 { font-size: 11px; color: #556; margin-bottom: 6px; }
    #grid-section .row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    #grid-section label { font-size: 11px; color: #667; width: 56px; }
    #grid-section input {
      width: 60px; background: #0d0d1a; border: 1px solid #334;
      color: #aab; padding: 2px 4px; border-radius: 3px; font-size: 11px;
    }

    /* lane 数量 */
    #lanes-section { margin-bottom: 12px; }
    #lanes-section h3 { font-size: 11px; color: #556; margin-bottom: 6px; }
    #lanes-section input {
      width: 60px; background: #0d0d1a; border: 1px solid #334;
      color: #aab; padding: 2px 4px; border-radius: 3px; font-size: 11px;
    }

    /* 底部按钮 */
    #save-bar {
      padding: 8px;
      border-top: 1px solid #1a1a30;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    #btn-save {
      background: #1e3a1e; border: 1px solid #2a5a2a;
      color: #88cc88; padding: 7px; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-family: monospace;
    }
    #btn-save:hover { background: #254a25; }
    #btn-normalize {
      background: #1a2a3a; border: 1px solid #2a4a5a;
      color: #88aacc; padding: 5px; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-family: monospace;
    }
    #btn-normalize:hover { background: #223344; }
    #btn-save-as {
      background: #1a1a35; border: 1px solid #334;
      color: #8899bb; padding: 5px; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-family: monospace;
    }
    #btn-save-as:hover { background: #222250; }
    #save-msg {
      font-size: 11px; text-align: center; min-height: 14px;
    }
    #save-msg.ok   { color: #44aa66; }
    #save-msg.err  { color: #cc4444; }

    /* 生成按钮 */
    #btn-generate {
      background: #1a2a1a; border: 1px solid #2a5a2a;
      color: #88cc88; padding: 5px; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-family: monospace;
      margin-bottom: 2px;
    }
    #btn-generate:hover { background: #223322; }
    #btn-preview {
      background: #1a1a3a; border: 1px solid #334488;
      color: #88aaff; padding: 5px; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-family: monospace;
      margin-bottom: 2px;
    }
    #btn-preview:hover { background: #222255; }

    /* 生成弹窗遮罩 */
    #gen-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #gen-modal.open { display: flex; }
    #gen-box {
      background: #111120;
      border: 1px solid #334;
      border-radius: 6px;
      padding: 18px 20px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 12px;
    }
    #gen-box h3 { font-size: 13px; color: #aaccff; margin-bottom: 2px; }
    #gen-box label { color: #667; display: block; margin-bottom: 3px; }
    #gen-box input[type=number], #gen-box select {
      width: 100%; background: #0d0d1a; border: 1px solid #334;
      color: #aab; padding: 4px 6px; border-radius: 3px;
      font-size: 12px; font-family: monospace;
    }
    #gen-box input[type=text] {
      width: 100%; background: #0d0d1a; border: 1px solid #334;
      color: #aab; padding: 4px 6px; border-radius: 3px;
      font-size: 12px; font-family: monospace;
    }
    #gen-drop {
      border: 2px dashed #334; border-radius: 4px;
      padding: 16px 8px; text-align: center;
      color: #556; cursor: pointer; transition: border-color 0.15s;
      font-size: 11px;
    }
    #gen-drop.dragover { border-color: #66aaff; color: #aaccff; }
    #gen-drop.has-img  { border-color: #44aa66; color: #44aa66; }
    #gen-preview {
      width: 100%; height: 80px; object-fit: contain;
      display: none; border-radius: 3px; background: #0d0d1a;
    }
    #gen-preview.show { display: block; }
    .gen-row { display: flex; gap: 8px; }
    .gen-row > div { flex: 1; }
    #gen-btn-row { display: flex; gap: 8px; margin-top: 4px; }
    #gen-submit {
      flex: 1; background: #1e3a1e; border: 1px solid #2a5a2a;
      color: #88cc88; padding: 7px; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-family: monospace;
    }
    #gen-submit:hover { background: #254a25; }
    #gen-submit:disabled { opacity: 0.4; cursor: default; }
    #gen-cancel {
      background: #1a1a30; border: 1px solid #334;
      color: #667; padding: 7px 12px; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-family: monospace;
    }
    #gen-cancel:hover { background: #222240; }
    #gen-log {
      font-size: 10px; color: #556; white-space: pre-wrap;
      max-height: 80px; overflow-y: auto; background: #0a0a18;
      border-radius: 3px; padding: 4px 6px; display: none;
    }
    #gen-log.show { display: block; }

    /* 状态栏 */
    #statusbar {
      position: fixed; bottom: 0; left: 130px; right: 240px;
      background: #090914; border-top: 1px solid #1a1a30;
      padding: 3px 12px; font-size: 11px; color: #445;
    }
  </style>
</head>
<body>

<!-- 左：关卡列表 -->
<div id="panel-levels">
  <h2>关 卡</h2>
  <div id="group-switch">
    <button id="btn-group-a" class="btn-group">A 组</button>
    <button id="btn-group-b" class="btn-group">B 组</button>
    <button id="btn-group-c" class="btn-group active">C 组</button>
  </div>
  <div id="level-list"></div>
</div>

<!-- 中：画布 -->
<div id="panel-canvas">
  <div id="canvas-toolbar">
    <label>宽</label>
    <input type="number" id="tb-width"  min="4" max="80" value="20">
    <label>高</label>
    <input type="number" id="tb-height" min="4" max="80" value="20">
    <label style="margin-left:8px">缩放</label>
    <input type="number" id="tb-zoom" min="4" max="32" value="12" step="2">
    <span style="color:#334;margin:0 4px">|</span>
    <span id="tb-info" style="color:#445;font-size:11px">—</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
  </div>
</div>

<!-- 右：属性面板 -->
<div id="panel-right">
  <h2>属 性</h2>
  <div id="panel-right-scroll">

    <div id="grid-section">
      <h3>网格尺寸</h3>
      <div class="row"><label>列数 (W)</label><input type="number" id="prop-w" min="4" max="80" value="20"></div>
      <div class="row"><label>行数 (H)</label><input type="number" id="prop-h" min="4" max="80" value="20"></div>
    </div>

    <div id="lanes-section">
      <h3>队列数量</h3>
      <input type="number" id="prop-lanes" min="1" max="8" value="3">
    </div>

    <div id="brush-section">
      <h3>画笔颜色</h3>
      <div id="brush-colors"></div>
      <div id="add-color-row">
        <input type="color" id="new-color-input" value="#ff6600">
        <button id="add-color-btn">+ 添加颜色</button>
      </div>
    </div>

    <div id="colors-section">
      <h3>颜色 / 炮车</h3>
      <div id="color-rows"></div>
    </div>

  </div>
  <div id="save-bar">
    <button id="btn-preview">试 玩 当 前 关 卡</button>
    <button id="btn-generate">从图片生成关卡…</button>
    <button id="btn-normalize">自动对齐（整十取整）</button>
    <button id="btn-save">保 存 关 卡</button>
    <button id="btn-save-as">另 存 为…</button>
    <div id="save-msg"></div>
  </div>
</div>

<div id="statusbar">未加载关卡</div>

<!-- 图片生成弹窗 -->
<div id="gen-modal">
  <div id="gen-box">
    <h3>从图片生成关卡</h3>

    <div>
      <label>拖入图片 / 点击选择</label>
      <div id="gen-drop">点击或拖拽图片到此处</div>
      <input type="file" id="gen-file-input" accept="image/*" style="display:none">
      <img id="gen-preview" alt="预览">
    </div>

    <div>
      <label>输出文件名（如 level302）</label>
      <input type="text" id="gen-filename" placeholder="level302">
    </div>

    <div class="gen-row">
      <div>
        <label>难度</label>
        <select id="gen-difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="veryhard">Very Hard</option>
        </select>
      </div>
      <div>
        <label>轨道数</label>
        <input type="number" id="gen-lanes" min="1" max="8" value="3">
      </div>
    </div>

    <div class="gen-row">
      <div>
        <label>颜色数（0=自动）</label>
        <input type="number" id="gen-colors" min="0" max="12" value="0">
      </div>
      <div>
        <label>槽位数</label>
        <input type="number" id="gen-slot" min="3" max="10" value="5">
      </div>
    </div>

    <div class="gen-row">
      <div>
        <label>网格宽</label>
        <input type="number" id="gen-bw" min="8" max="40" value="20">
      </div>
      <div>
        <label>网格高</label>
        <input type="number" id="gen-bh" min="8" max="40" value="20">
      </div>
    </div>

    <div class="gen-row" style="align-items:center">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="gen-fixed-palette" style="width:auto;accent-color:#cc5500">
        固定35色板（与像素化工具一致）
      </label>
    </div>

    <div id="gen-log"></div>

    <div id="gen-btn-row">
      <button id="gen-cancel">取消</button>
      <button id="gen-submit" disabled>生 成</button>
    </div>
  </div>
</div>

<script type="module" src="/src/editor/editor.js"></script>
</body>
</html>
