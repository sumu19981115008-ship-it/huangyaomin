name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 添加 iOS 平台
        run: npx cap add ios

      - name: 同步文件
        run: npx cap sync ios

      - name: 构建 iOS（未签名）
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: 打包为 IPA（模拟器 .app → zip）
        run: |
          APP_PATH=$(find ios/build -name "*.app" | head -1)
          mkdir -p ios/Payload
          cp -r "$APP_PATH" ios/Payload/App.app
          cd ios && zip -r magic-flow-sim.ipa Payload

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: magic-flow-ios-sim
          path: ios/magic-flow-sim.ipa
