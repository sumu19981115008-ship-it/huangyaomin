name: 打包安卓 APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 安装 Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 构建网页资源
        run: npx vite build

      - name: 复制关卡和资源到 dist
        run: |
          cp -r levels dist/levels
          cp phaser.min.js dist/phaser.min.js

      - name: 初始化 Capacitor
        run: npx cap init FixelFlow2 com.fixelflow.game2 --web-dir dist

      - name: 添加安卓平台
        run: npx cap add android

      - name: 同步资源
        run: npx cap sync android

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 授权 Gradle 执行权限
        run: chmod +x android/gradlew

      - name: 修复 Kotlin stdlib 版本冲突
        run: |
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.8.22'/" android/build.gradle
          printf '\nconfigurations.all {\n    resolutionStrategy {\n        force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"\n        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"\n        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"\n    }\n}\n' >> android/app/build.gradle

      - name: 构建 APK（Debug）
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: fixelflow2-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
