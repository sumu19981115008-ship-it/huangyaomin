<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>FixelFlow 2 — 像素化 & 关卡生成工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;overflow:hidden;background:#0d0d1a;color:#ccccee;font-family:monospace;font-size:13px}

/* ── 左侧控制面板 ── */
#panel-left{width:260px;min-width:260px;display:flex;flex-direction:column;border-right:1px solid #2a2a50;overflow-y:auto}
.section{padding:12px;border-bottom:1px solid #1c1c38}
.section h3{font-size:11px;color:#6666aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
label{display:block;margin-bottom:4px;color:#9999cc}
input[type=range]{width:100%;accent-color:#5555cc}
input[type=number]{width:100%;background:#111128;border:1px solid #2a2a50;color:#ccccee;padding:4px 6px;border-radius:4px}
input[type=file]{display:none}

.upload-btn{display:block;width:100%;padding:10px;background:#1a1a3a;border:2px dashed #3333aa;border-radius:6px;color:#8888cc;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-btn:hover{border-color:#6666ff;color:#aaaaff}

.btn{display:block;width:100%;padding:8px;margin-top:6px;background:#222244;border:1px solid #4444aa;border-radius:5px;color:#aaaaff;cursor:pointer;text-align:center;transition:background .15s}
.btn:hover{background:#333366}
.btn.primary{background:#3333aa;border-color:#6666ff;color:#ffffff}
.btn.primary:hover{background:#4444cc}
.btn.success{background:#1a4a1a;border-color:#44aa44;color:#88ff88}
.btn.success:hover{background:#225522}
.btn:disabled{opacity:.4;cursor:not-allowed}

.val-display{display:inline-block;float:right;color:#ffffff;min-width:28px;text-align:right}

.color-palette{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.color-swatch{width:28px;height:28px;border-radius:4px;border:2px solid transparent;cursor:pointer;position:relative;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.excluded{opacity:.3;border-color:#ff4444}
.color-swatch .cnt{position:absolute;bottom:1px;right:2px;font-size:8px;color:rgba(255,255,255,.85);text-shadow:0 0 2px #000;pointer-events:none}

.stat-row{display:flex;justify-content:space-between;margin-top:4px;color:#8888aa}
.stat-row span:last-child{color:#ccccee}

/* ── 中央画布区 ── */
#panel-canvas{flex:1;display:flex;flex-direction:column;overflow:hidden}
#canvas-toolbar{padding:8px 12px;background:#0a0a18;border-bottom:1px solid #1c1c38;display:flex;gap:12px;align-items:center;flex-shrink:0}
#canvas-toolbar span{color:#666688;font-size:11px}
#canvas-toolbar strong{color:#aaaacc}
#canvas-wrap{flex:1;overflow:auto;display:flex;gap:20px;padding:20px;align-items:flex-start;justify-content:center}
.canvas-block{display:flex;flex-direction:column;align-items:center;gap:8px}
.canvas-label{font-size:11px;color:#555577}
canvas{image-rendering:pixelated;border:1px solid #2a2a50}

/* ── 右侧输出面板 ── */
#panel-right{width:240px;min-width:240px;display:flex;flex-direction:column;border-left:1px solid #2a2a50;overflow-y:auto}
#json-preview{flex:1;overflow-y:auto;padding:10px;font-size:10px;color:#5555aa;white-space:pre-wrap;word-break:break-all;line-height:1.5}
#save-bar{padding:10px;border-top:1px solid #1c1c38}
#save-msg{margin-top:6px;font-size:11px;color:#888888;min-height:16px;text-align:center}

.progress-bar{width:100%;height:4px;background:#111128;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#5555cc;transition:width .1s;width:0%}

/* ── 四格对比 modal ── */
#compare-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#compare-modal.open{display:flex}
#compare-modal h2{color:#aaaaee;font-size:13px;letter-spacing:1px}
#compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cmp-cell{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:10px;border:2px solid #2a2a50;border-radius:8px;transition:border-color .15s,transform .1s;background:#0d0d1a}
.cmp-cell:hover{border-color:#6666ff;transform:scale(1.03)}
.cmp-cell canvas{image-rendering:pixelated;max-width:320px;max-height:240px}
.cmp-label{font-size:11px;color:#8888cc;text-align:center;line-height:1.6}
#compare-close{font-size:11px;color:#555577;cursor:pointer;margin-top:4px}
#compare-close:hover{color:#aaaacc}
</style>
</head>
<body>

<!-- ── 左侧控制面板 ── -->
<div id="panel-left">

  <div class="section">
    <h3>上传图片</h3>
    <label class="upload-btn" for="file-input" id="upload-label">
      点击或拖拽图片到此处
    </label>
    <input type="file" id="file-input" accept="image/*">
    <button class="btn" id="btn-reset" style="margin-top:6px;color:#ff8888;border-color:#663333">重置所有条件</button>
  </div>

  <div class="section">
    <h3>网格尺寸</h3>
    <label style="margin-bottom:6px">评分模式</label>
    <select id="sel-score-mode" style="width:100%;background:#111128;border:1px solid #2a2a50;color:#ccccee;padding:4px 6px;border-radius:4px;margin-bottom:8px">
      <option value="iou">形状 IoU（交并比，最形似）</option>
      <option value="ambig">歧义格最小（轮廓最干净）</option>
      <option value="edge">边缘对齐（网格线贴边缘）</option>
      <option value="combo" selected>综合（IoU × 纯净度 × 对齐）</option>
    </select>
    <button class="btn primary" id="btn-auto-grid" disabled>自动寻优网格</button>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button class="btn" id="btn-grid-smaller" disabled style="flex:1;padding:6px 0">− 缩小</button>
      <button class="btn" id="btn-grid-larger"  disabled style="flex:1;padding:6px 0">+ 放大</button>
    </div>
    <button class="btn" id="btn-compare" disabled style="margin-top:6px">四格对比预览</button>
    <div id="auto-grid-status" style="margin-top:6px;font-size:10px;color:#555577;min-height:28px;line-height:1.6;white-space:pre-line">需要先抠图</div>
    <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" id="progress-grid"></div></div>
    <label style="margin-top:10px">宽度（格）<span class="val-display" id="val-gw">20</span></label>
    <input type="range" id="rng-gw" min="4" max="100" value="20">
    <label style="margin-top:8px">高度（格）<span class="val-display" id="val-gh">20</span></label>
    <input type="range" id="rng-gh" min="4" max="100" value="20">
    <div style="margin-top:6px;font-size:10px;color:#555577">手动调整后点「重新生成」</div>
  </div>

  <div class="section">
    <h3>颜色控制 <span style="color:#5555cc;font-size:10px">（寻优时自动调整）</span></h3>

    <div style="margin-bottom:10px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="chk-fixed-palette" style="width:auto;accent-color:#cc5500">
        <span style="color:#ffaa66;font-weight:bold">固定色板模式（35色）</span>
      </label>
      <div id="fixed-palette-preview" style="display:none;margin-top:6px;flex-wrap:wrap;gap:2px"></div>
    </div>

    <div id="dynamic-color-controls">
      <label>最大颜色数 <span class="val-display" id="val-colors">6</span></label>
      <input type="range" id="rng-colors" min="2" max="16" value="6">
      <label style="margin-top:8px">相似色合并阈值 <span class="val-display" id="val-thresh">25</span></label>
      <input type="range" id="rng-thresh" min="0" max="100" value="25">
    </div>
    <div id="fixed-color-controls" style="display:none">
      <label>颜色数 <span class="val-display" id="val-fixed-colors">6</span></label>
      <input type="range" id="rng-fixed-colors" min="2" max="34" value="6">
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="section">
    <h3>去除背景</h3>

    <div style="margin-bottom:8px">
      <label style="margin-bottom:4px">remove.bg API Key</label>
      <div style="display:flex;gap:4px">
        <input type="password" id="rmbg-key" placeholder="粘贴 API Key" style="flex:1;font-size:11px">
        <button class="btn" id="btn-rmbg" style="width:auto;padding:4px 8px;margin:0;white-space:nowrap" disabled>抠图</button>
      </div>
      <div id="rmbg-status" style="margin-top:4px;font-size:10px;color:#555577">未使用</div>
    </div>

    <div style="border-top:1px solid #1c1c38;padding-top:8px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="chk-outline-mode" style="width:auto;accent-color:#aaaaff">
        <span style="color:#ccccff;font-weight:bold">黑色描边模式</span>
      </label>
      <div id="outline-controls" style="display:none">
        <label style="color:#888899">描边亮度阈值（L &lt; N = 黑） <span class="val-display" id="val-outline-thresh">30</span></label>
        <input type="range" id="rng-outline-thresh" min="5" max="60" value="30">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:6px">
          <input type="checkbox" id="chk-keep-outline" checked style="width:auto;accent-color:#aaaaff">
          <span style="color:#888899">保留描边作为颜色</span>
        </label>
      </div>
    </div>

    <div style="border-top:1px solid #1c1c38;padding-top:8px;margin-top:4px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="chk-remove-bg" style="width:auto;accent-color:#5555cc">
        <span style="color:#777799">泛洪填充去背景</span>
      </label>
      <label style="color:#888899">背景色差阈值 <span class="val-display" id="val-bg-thresh">20</span></label>
      <input type="range" id="rng-bg-thresh" min="0" max="80" value="20">
      <label style="color:#888899;margin-top:6px">边缘腐蚀（去白边） <span class="val-display" id="val-erode">1</span> 格</label>
      <input type="range" id="rng-erode" min="0" max="4" value="1">
    </div>

    <div style="border-top:1px solid #1c1c38;padding-top:8px;margin-top:8px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="chk-crop-fg" checked style="width:auto;accent-color:#5555cc">
        <span style="color:#aaaacc">去背景后自动放大主体</span>
      </label>
      <label style="color:#888899">边距（格子比例） <span class="val-display" id="val-crop-pad">5</span>%</label>
      <input type="range" id="rng-crop-pad" min="0" max="20" value="5">
      <div id="crop-status" style="margin-top:4px;font-size:10px;color:#555577;min-height:14px"></div>
    </div>
  </div>

  <div class="section">
    <h3>当前调色板</h3>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px">
      <input type="checkbox" id="chk-free-mode" style="width:auto;accent-color:#cc3388">
      <span style="color:#ff88cc">自由模式（不限颜色数 / 不限10倍数）</span>
    </label>
    <div id="color-palette" class="color-palette"></div>
    <div class="stat-row"><span>颜色数</span><span id="stat-colors">—</span></div>
    <div class="stat-row"><span>总格子数</span><span id="stat-cells">—</span></div>
    <div class="stat-row" id="stat-warn" style="color:#ff8844;display:none">
      <span>⚠ 含非10倍数颜色</span>
    </div>
    <button class="btn" id="btn-process" disabled>重新生成</button>
  </div>

  <div class="section">
    <h3>生成关卡</h3>
    <label>关卡编号</label>
    <input type="number" id="level-num" min="1" max="999" value="305" style="margin-bottom:8px">
    <label>队列数量</label>
    <input type="number" id="lane-count" min="1" max="6" value="4" style="margin-bottom:8px">
    <button class="btn success" id="btn-generate" disabled>生成关卡 JSON</button>
  </div>

</div>

<!-- ── 中央画布区 ── -->
<div id="panel-canvas">
  <div id="canvas-toolbar">
    <span>原图</span>
    <strong id="info-orig">—</strong>
    <span style="margin-left:12px">像素化结果</span>
    <strong id="info-pixel">—</strong>
    <span style="margin-left:auto;font-size:10px;color:#444466">点击调色板颜色可切换排除/包含</span>
  </div>
  <div id="canvas-wrap">
    <div class="canvas-block">
      <div class="canvas-label">原图</div>
      <canvas id="canvas-orig"></canvas>
    </div>
    <div class="canvas-block">
      <div class="canvas-label">像素化预览</div>
      <canvas id="canvas-pixel"></canvas>
    </div>
  </div>
</div>

<!-- ── 右侧输出面板 ── -->
<div id="panel-right">
  <div class="section" style="flex-shrink:0">
    <h3>关卡 JSON 预览</h3>
  </div>
  <div id="json-preview">（尚未生成）</div>
  <div id="save-bar">
    <button class="btn primary" id="btn-save" disabled>保存到 levels/</button>
    <div id="save-msg"></div>
  </div>
</div>

<!-- ── 四格对比 modal ── -->
<div id="compare-modal">
  <h2>点击任意预览选定该尺寸</h2>
  <div id="compare-grid"></div>
  <div id="compare-close">✕ 关闭</div>
</div>

<script>
// ════════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════════

// sRGB → 线性光
function srgbToLinear(v){ v/=255; return v<=.04045?v/12.92:Math.pow((v+.055)/1.055,2.4); }
// 线性光 → sRGB
function linearToSrgb(v){ return v<=.0031308?v*12.92:1.055*Math.pow(v,1/2.4)-.055; }

// RGB → CIEXYZ (D65)
function rgbToXyz(r,g,b){
  r=srgbToLinear(r); g=srgbToLinear(g); b=srgbToLinear(b);
  return [
    r*.4124564+g*.3575761+b*.1804375,
    r*.2126729+g*.7151522+b*.0721750,
    r*.0193339+g*.1191920+b*.9503041,
  ];
}
// XYZ → Lab
function xyzToLab(x,y,z){
  const f=t=>t>.008856?Math.cbrt(t):(7.787*t+16/116);
  x=f(x/.95047); y=f(y/1.00000); z=f(z/1.08883);
  return [116*y-16, 500*(x-y), 200*(y-z)];
}
function rgbToLab(r,g,b){ return xyzToLab(...rgbToXyz(r,g,b)); }

// CIE76 色差
function deltaE(c1,c2){
  const dl=c1[0]-c2[0],da=c1[1]-c2[1],db=c1[2]-c2[2];
  return Math.sqrt(dl*dl+da*da+db*db);
}

// 将 [r,g,b] 转为 hex 字符串
function rgbHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('').toUpperCase();
}

// ════════════════════════════════════════════════
// Median Cut 色彩量化（替代 K-Means）
//
// 原理来自 GIF 标准量化算法：
//   把所有像素的 RGB 颜色空间视为一个三维色块，
//   反复找跨度最大的轴从中位数切一刀，递归分到 K 个桶，
//   每桶取原图中离均值最近的真实像素作为代表色。
//
// 优势：确定性（无随机，无迭代），速度 O(n log K)，
//       颜色覆盖更均匀，结果稳定不跳变。
// ════════════════════════════════════════════════

function medianCutQuantize(pixels, k){
  const n = pixels.length / 4;

  // 收集所有前景像素索引
  const indices = [];
  for(let i = 0; i < n; i++){
    if(pixels[i*4+3] >= 128) indices.push(i);
  }
  if(indices.length === 0) return { palette: [[128,128,128]], assignment: new Int32Array(n) };

  // 递归 median cut：buckets 是像素索引数组的列表
  let buckets = [indices];
  while(buckets.length < k){
    // 找跨度最大的桶
    let maxSpread = -1, splitIdx = 0;
    for(let bi = 0; bi < buckets.length; bi++){
      const b = buckets[bi];
      let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
      for(const i of b){
        const r=pixels[i*4],g=pixels[i*4+1],bv=pixels[i*4+2];
        if(r<minR)minR=r; if(r>maxR)maxR=r;
        if(g<minG)minG=g; if(g>maxG)maxG=g;
        if(bv<minB)minB=bv; if(bv>maxB)maxB=bv;
      }
      const spread = Math.max(maxR-minR, maxG-minG, maxB-minB);
      if(spread > maxSpread){ maxSpread=spread; splitIdx=bi; }
    }

    const bucket = buckets[splitIdx];
    if(bucket.length <= 1) break; // 无法继续分

    // 找跨度最大的通道，按该通道中位数切割
    let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
    for(const i of bucket){
      const r=pixels[i*4],g=pixels[i*4+1],bv=pixels[i*4+2];
      if(r<minR)minR=r; if(r>maxR)maxR=r;
      if(g<minG)minG=g; if(g>maxG)maxG=g;
      if(bv<minB)minB=bv; if(bv>maxB)maxB=bv;
    }
    const spanR=maxR-minR, spanG=maxG-minG, spanB=maxB-minB;
    const ch = spanR>=spanG && spanR>=spanB ? 0 : spanG>=spanB ? 1 : 2;

    // 按通道值排序后从中间切
    bucket.sort((a,b) => pixels[a*4+ch] - pixels[b*4+ch]);
    const mid = bucket.length >> 1;
    buckets.splice(splitIdx, 1, bucket.slice(0, mid), bucket.slice(mid));
  }

  // 每个桶：计算均值，再从桶内找离均值最近的真实像素作代表色
  const palette = [];
  const bucketOf = new Int32Array(n).fill(-1);

  for(let bi = 0; bi < buckets.length; bi++){
    const b = buckets[bi];
    let sr=0,sg=0,sbv=0;
    for(const i of b){ sr+=pixels[i*4]; sg+=pixels[i*4+1]; sbv+=pixels[i*4+2]; }
    const avgR=sr/b.length, avgG=sg/b.length, avgB=sbv/b.length;
    let bestDist=Infinity, bestR=Math.round(avgR), bestG=Math.round(avgG), bestB=Math.round(avgB);
    for(const i of b){
      const r=pixels[i*4],g=pixels[i*4+1],bv=pixels[i*4+2];
      const d=(r-avgR)**2+(g-avgG)**2+(bv-avgB)**2;
      if(d<bestDist){ bestDist=d; bestR=r; bestG=g; bestB=bv; }
      bucketOf[i] = bi;
    }
    palette.push([bestR, bestG, bestB]);
  }

  // 背景像素分配到最近的桶
  const assignment = new Int32Array(n);
  for(let i = 0; i < n; i++){
    if(bucketOf[i] >= 0){ assignment[i] = bucketOf[i]; continue; }
    // alpha<128 的背景像素：找最近代表色
    const r=pixels[i*4],g=pixels[i*4+1],bv=pixels[i*4+2];
    let best=Infinity, bestK=0;
    for(let ci=0;ci<palette.length;ci++){
      const c=palette[ci];
      const d=(r-c[0])**2+(g-c[1])**2+(bv-c[2])**2;
      if(d<best){best=d;bestK=ci;}
    }
    assignment[i]=bestK;
  }

  return { palette, assignment };
}

// 兼容旧调用名
function kMeansQuantize(pixels, k){ return medianCutQuantize(pixels, k); }

// ════════════════════════════════════════════════
// 相似色合并（LAB 色差 < 阈值，贪心 Union-Find）
// ════════════════════════════════════════════════

function mergeSimilarColors(palette, assignment, threshold){
  const k = palette.length;
  const n = assignment.length;
  const counts = new Array(k).fill(0);
  for(let i=0;i<n;i++) counts[assignment[i]]++;
  const labs = palette.map(([r,g,b])=>rgbToLab(r,g,b));

  // Union-Find
  const parent = Array.from({length:k},(_,i)=>i);
  function find(x){ while(parent[x]!==x) x=parent[x]=parent[parent[x]]; return x; }
  function union(a,b){ parent[find(a)]=find(b); }

  // 收集所有色差 < 阈值的颜色对，按距离升序合并
  const pairs = [];
  for(let i=0;i<k;i++) for(let j=i+1;j<k;j++){
    const d = deltaE(labs[i], labs[j]);
    if(d < threshold) pairs.push([d,i,j]);
  }
  pairs.sort((a,b)=>a[0]-b[0]);
  for(const [,i,j] of pairs) union(i,j);

  // 收集根节点 → 聚类代表色
  // 用加权均值作为目标，然后从被合并的各聚类中选最近的真实颜色
  const rootSums = {};
  for(let ci=0;ci<k;ci++){
    const root = find(ci);
    if(!rootSums[root]) rootSums[root]=[0,0,0,0];
    rootSums[root][0]+=palette[ci][0]*counts[ci];
    rootSums[root][1]+=palette[ci][1]*counts[ci];
    rootSums[root][2]+=palette[ci][2]*counts[ci];
    rootSums[root][3]+=counts[ci];
  }
  const uniqueRoots = Object.keys(rootSums).map(Number);
  const rootColors = {};
  for(const root of uniqueRoots){
    const s = rootSums[root];
    const avg = s[3]>0 ? [s[0]/s[3], s[1]/s[3], s[2]/s[3]] : [0,0,0];
    // 从隶属该根的所有聚类里，选真实颜色中离均值最近的
    let bestDist = Infinity, bestColor = avg.map(Math.round);
    for(let ci=0;ci<k;ci++){
      if(find(ci) !== root) continue;
      const [r,g,b] = palette[ci];
      const d=(r-avg[0])**2+(g-avg[1])**2+(b-avg[2])**2;
      if(d < bestDist){ bestDist=d; bestColor=[r,g,b]; }
    }
    rootColors[root] = bestColor;
  }
  // mergeMap[原聚类] = 根节点
  const mergeMap = Array.from({length:k},(_,i)=>find(i));
  return { mergeMap, uniqueRoots, rootColors };
}

// ════════════════════════════════════════════════
// 配额约束分配：保证每种颜色格子数严格为10的倍数
//
// 算法：
//  1. 根据 K-Means 自然比例计算每种颜色的初始配额（10的倍数，总和≤N）
//  2. 把剩余格子补给比例最大的颜色（每次+10），直到总配额=N
//  3. 用"置信度优先"贪心分配：
//     对每个格子计算 (最近色距离 - 次近色距离)，差值越大越"确信"
//     按置信度从高到低依次分配，配额满的颜色不再接收
//  4. 所有格子都会被分配（不丢弃），保证无黑点
// ════════════════════════════════════════════════

function assignWithQuota(rawCells, colorHexList, colorLabList, excludedColors){
  // 过滤排除色
  const validHexes = colorHexList.filter(h => !excludedColors.has(h));
  const validLabs  = validHexes.map((_,i) => colorLabList[colorHexList.indexOf(validHexes[i])]);

  if(validHexes.length === 0) return [];

  const C = validHexes.length;
  const N = rawCells.length;

  // 1. 自然分配：每个格子先指定到最近颜色，统计初始数量
  const naturalCount = new Array(C).fill(0);
  for(const cell of rawCells){
    let best=Infinity, bi=0;
    for(let ci=0;ci<C;ci++){
      const d=deltaE(cell.labColor, validLabs[ci]);
      if(d<best){best=d;bi=ci;}
    }
    naturalCount[bi]++;
  }

  // 2. 计算配额（向下取到10的倍数，最小10；自然分配为0的颜色不参与）
  const quota = naturalCount.map(n => n === 0 ? 0 : Math.max(10, Math.floor(n/10)*10));
  let total = quota.reduce((a,b)=>a+b, 0);

  // 3. 差额补偿：total < N 时，把剩余名额按自然比例补给，每次+10给比例最大的
  //    差额一定是10的倍数（因为N=GW*GH，所有配额都是10的倍数）
  //    如果N本身不是10的倍数，补到最近的更大10的倍数
  const targetN = Math.ceil(N/10)*10;
  // 需要增发的额度
  while(total < targetN){
    // 找当前"欠额比例"最大的颜色（naturalCount>0 的颜色中 naturalCount/quota 最大的）
    let bestRatio = -1, bestCI = -1;
    for(let ci=0;ci<C;ci++){
      if(naturalCount[ci] === 0) continue; // 图中没出现的颜色不参与补偿
      const ratio = naturalCount[ci] / (quota[ci] || 1);
      if(ratio > bestRatio){ bestRatio=ratio; bestCI=ci; }
    }
    if(bestCI === -1) break; // 所有颜色都未出现（不应发生）
    quota[bestCI] += 10;
    total += 10;
  }

  // 4. 置信度排序分配
  //    置信度 = (最近色距离 - 次近色距离) 的绝对差，越大越确信
  const scored = rawCells.map(cell => {
    const dists = validLabs.map(lab => deltaE(cell.labColor, lab));
    const sorted = [...dists].sort((a,b)=>a-b);
    const best1 = sorted[0];
    const best2 = sorted[1] ?? best1;
    const bi = dists.indexOf(best1);
    return { cell, bi, confidence: best2 - best1 };
  });
  // 置信度高的先分配（更确信归属哪个颜色）
  scored.sort((a,b) => b.confidence - a.confidence);

  const remaining = [...quota]; // 各颜色剩余配额
  const result = new Array(rawCells.length);
  // 建立 cell → result 索引的映射（rawCells 顺序）
  const cellIndex = new Map(rawCells.map((c,i)=>[c,i]));

  for(const { cell, bi, confidence } of scored){
    let assigned = -1;
    // 优先分配到最近颜色
    if(remaining[bi] > 0){
      assigned = bi;
    } else {
      // 最近颜色满了，找下一个未满的最近颜色
      const dists = validLabs.map(lab => deltaE(cell.labColor, lab));
      const order = [...Array(C).keys()].sort((a,b)=>dists[a]-dists[b]);
      for(const ci of order){
        if(remaining[ci] > 0){ assigned=ci; break; }
      }
    }
    if(assigned === -1) assigned = remaining.findIndex(r=>r>0);
    remaining[assigned]--;
    result[cellIndex.get(cell)] = { ...cell, colorHex: validHexes[assigned] };
  }

  const assigned = result.filter(Boolean);

  // ── 方案 B：边界格交换修正 ──
  // 统计各颜色实际格数，对非10倍数颜色做最小误差修正
  // 只在相邻颜色的边界格上操作（改动视觉影响最小）
  fixToMultipleOfTen(assigned);

  return assigned;
}

// 边界格交换修正：保证每种颜色格子数严格为10的倍数
function fixToMultipleOfTen(cells){
  // 统计各颜色数量
  const countMap = {};
  for(const c of cells) countMap[c.colorHex] = (countMap[c.colorHex] || 0) + 1;

  // 计算各颜色需要补/减的格数（目标：向最近10倍数取整）
  const delta = {}; // 正=需要增加，负=需要减少
  for(const [hex, cnt] of Object.entries(countMap)){
    const rem = cnt % 10;
    if(rem === 0) continue;
    // 就近取整：rem<=5 向下，rem>5 向上
    delta[hex] = rem <= 5 ? -rem : (10 - rem);
  }

  // 没有需要修正的颜色就直接返回
  if(Object.keys(delta).length === 0) return;

  // 建立坐标索引，方便查找邻居
  const posMap = new Map();
  cells.forEach((c, i) => posMap.set(`${c.x},${c.y}`, i));

  // 找边界格：该格与至少一个四邻域颜色不同
  // 对于需要"减少"的颜色，找它的边界格；对于需要"增加"的颜色，从邻居边界格抢
  // 核心：把"需要减少"颜色的边界格，改色给"需要增加"的颜色中颜色最近的一个

  // 迭代直到所有 delta 归零（最多迭代总修正格数次，不会死循环）
  const maxIter = Object.values(delta).reduce((a, b) => a + Math.abs(b), 0) * 2;
  let iter = 0;

  while(iter++ < maxIter){
    // 找一个需要减少的颜色（delta < 0）
    const srcHex = Object.keys(delta).find(h => delta[h] < 0);
    if(!srcHex) break; // 所有颜色已满足或只剩需增加的（等待配对）

    // 找一个需要增加的颜色（delta > 0）
    const dstHex = Object.keys(delta).find(h => delta[h] > 0);
    if(!dstHex) break;

    // 找 srcHex 中，与 dstHex 格子相邻的边界格（颜色误差最小的优先）
    const srcLab = rgbToLab(...hexToRgb(srcHex));
    const dstLab = rgbToLab(...hexToRgb(dstHex));

    let bestIdx = -1, bestDist = Infinity;
    for(let i = 0; i < cells.length; i++){
      const c = cells[i];
      if(c.colorHex !== srcHex) continue;
      // 检查是否与 dstHex 相邻
      const neighbors = [[c.x-1,c.y],[c.x+1,c.y],[c.x,c.y-1],[c.x,c.y+1]];
      const adjDst = neighbors.some(([nx,ny]) => {
        const ni = posMap.get(`${nx},${ny}`);
        return ni !== undefined && cells[ni].colorHex === dstHex;
      });
      if(!adjDst) continue;
      // 计算该格改色的颜色误差（原色 Lab 距 dstLab 的距离）
      const dist = deltaE(c.labColor, dstLab);
      if(dist < bestDist){ bestDist = dist; bestIdx = i; }
    }

    if(bestIdx === -1){
      // 找不到与 dstHex 相邻的格子，放宽：找 srcHex 中任意边界格
      for(let i = 0; i < cells.length; i++){
        const c = cells[i];
        if(c.colorHex !== srcHex) continue;
        const neighbors = [[c.x-1,c.y],[c.x+1,c.y],[c.x,c.y-1],[c.x,c.y+1]];
        const isBoundary = neighbors.some(([nx,ny]) => {
          const ni = posMap.get(`${nx},${ny}`);
          return ni !== undefined && cells[ni].colorHex !== srcHex;
        });
        if(!isBoundary) continue;
        const dist = deltaE(c.labColor, dstLab);
        if(dist < bestDist){ bestDist = dist; bestIdx = i; }
      }
    }

    if(bestIdx === -1) break; // 完全找不到边界格，放弃

    // 执行颜色替换
    cells[bestIdx] = { ...cells[bestIdx], colorHex: dstHex };
    delta[srcHex]++;
    delta[dstHex]--;
    if(delta[srcHex] === 0) delete delta[srcHex];
    if(delta[dstHex] === 0) delete delta[dstHex];
  }
}

// hex → [r,g,b]
function hexToRgb(hex){
  const n = parseInt(hex.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

// ════════════════════════════════════════════════
// 泛洪填充去背景
// 从四个角出发，把与角落颜色色差 < threshold 的连通区域标记为背景
// 返回 Set<"x,y"> 表示背景格子坐标
// ════════════════════════════════════════════════

function floodFillBg(cells, GW, GH, threshold){
  // 建立坐标 → Lab 映射
  const labMap = new Map();
  for(const c of cells) labMap.set(`${c.x},${c.y}`, c.labColor);

  const bgSet = new Set();

  // 四个角的种子，收集背景色 Lab 均值（用于后续腐蚀判断）
  const corners = [[0,0],[GW-1,0],[0,GH-1],[GW-1,GH-1]];
  const bgLabSamples = [];

  for(const [sx, sy] of corners){
    const key = `${sx},${sy}`;
    if(bgSet.has(key)) continue;
    const seedLab = labMap.get(key);
    if(!seedLab) continue;
    bgLabSamples.push(seedLab);

    const queue = [[sx, sy]];
    bgSet.add(key);

    while(queue.length){
      const [x, y] = queue.pop();
      for(const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nx = x+dx, ny = y+dy;
        if(nx<0||nx>=GW||ny<0||ny>=GH) continue;
        const nk = `${nx},${ny}`;
        if(bgSet.has(nk)) continue;
        const nLab = labMap.get(nk);
        if(!nLab) continue;
        if(deltaE(seedLab, nLab) <= threshold){
          bgSet.add(nk);
          queue.push([nx, ny]);
        }
      }
    }
  }

  // 背景色均值 Lab
  const bgLab = bgLabSamples.length > 0
    ? bgLabSamples.reduce((a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]])
        .map(v => v / bgLabSamples.length)
    : [100, 0, 0]; // 无种子时退化为白色

  return { bgSet, labMap, bgLab };
}

// ════════════════════════════════════════════════
// 黑色描边模式去背景
//
// 把格子 Lab 亮度 L < lThresh 的视为描边墙（不可穿越）。
// 从四角泛洪，遇描边墙停止 → 泛洪到的区域 = 背景。
// 描边格自身根据 keepOutline 决定是否保留。
// 返回 { bgSet: Set<"x,y">, outlineSet: Set<"x,y"> }
// ════════════════════════════════════════════════

function outlineModeBg(cells, GW, GH, lThresh, keepOutline){
  const labMap = new Map();
  for(const c of cells) labMap.set(`${c.x},${c.y}`, c.labColor);

  // 标记描边格（L < lThresh）
  const outlineSet = new Set();
  for(const c of cells){
    const lab = labMap.get(`${c.x},${c.y}`);
    if(lab && lab[0] < lThresh) outlineSet.add(`${c.x},${c.y}`);
  }

  // 从四角泛洪，描边墙不可穿越
  const bgSet = new Set();
  const corners = [[0,0],[GW-1,0],[0,GH-1],[GW-1,GH-1]];
  for(const [sx, sy] of corners){
    const key = `${sx},${sy}`;
    if(bgSet.has(key) || outlineSet.has(key)) continue;
    const queue = [[sx, sy]];
    bgSet.add(key);
    while(queue.length){
      const [x, y] = queue.pop();
      for(const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nx = x+dx, ny = y+dy;
        if(nx<0||nx>=GW||ny<0||ny>=GH) continue;
        const nk = `${nx},${ny}`;
        if(bgSet.has(nk) || outlineSet.has(nk)) continue;
        bgSet.add(nk);
        queue.push([nx, ny]);
      }
    }
  }

  // 描边格：keepOutline=false 时也视为背景（去掉黑边）
  if(!keepOutline){
    for(const k of outlineSet) bgSet.add(k);
  }

  return { bgSet, outlineSet };
}

// 去背景后放大主体到画布边缘
//
// 从 alphaMask 中计算前景像素的包围盒（bounding box），
// 然后把 srcImage 和 alphaMask 都裁剪到该区域后，
// 等比缩放至填满原始画布尺寸（留 pad% 边距），居中放置。
// 更新 srcImage（HTMLImageElement → 新 Image）和 alphaMask。
// ════════════════════════════════════════════════

async function cropToForeground(){
  if(!alphaMask) return;
  const chk = document.getElementById('chk-crop-fg');
  if(!chk.checked) return;

  const pad = parseInt(document.getElementById('rng-crop-pad').value) / 100;
  const cropStatus = document.getElementById('crop-status');

  const { imageData: aData, w: aw, h: ah } = alphaMask;
  const d = aData.data;

  // 1. 找前景包围盒
  let minX = aw, maxX = 0, minY = ah, maxY = 0;
  for(let y = 0; y < ah; y++){
    for(let x = 0; x < aw; x++){
      if(d[(y * aw + x) * 4 + 3] >= 32){
        if(x < minX) minX = x;
        if(x > maxX) maxX = x;
        if(y < minY) minY = y;
        if(y > maxY) maxY = y;
      }
    }
  }

  if(minX > maxX || minY > maxY){
    cropStatus.textContent = '未检测到前景，跳过放大';
    cropStatus.style.color = '#ff8844';
    return;
  }

  const fgW = maxX - minX + 1;
  const fgH = maxY - minY + 1;
  const origW = srcImage.width;
  const origH = srcImage.height;

  // 主体已接近满幅（留 5px 余量）则不处理
  if(fgW >= origW - 5 && fgH >= origH - 5){
    cropStatus.textContent = '主体已充满，无需放大';
    cropStatus.style.color = '#555577';
    return;
  }

  // 2. 计算目标区域：保持宽高比，带 pad 边距，居中放置
  const paddedW = origW * (1 - pad * 2);
  const paddedH = origH * (1 - pad * 2);
  const scale   = Math.min(paddedW / fgW, paddedH / fgH);
  const dstW    = Math.round(fgW * scale);
  const dstH    = Math.round(fgH * scale);
  const dstX    = Math.round((origW - dstW) / 2);
  const dstY    = Math.round((origH - dstH) / 2);

  // 3. 重绘 srcImage（原图区域裁剪后缩放到目标位置）
  const newImgC = document.createElement('canvas');
  newImgC.width = origW; newImgC.height = origH;
  const imgCtx = newImgC.getContext('2d');
  imgCtx.clearRect(0, 0, origW, origH);
  imgCtx.drawImage(srcImage, minX * origW / aw, minY * origH / ah,
    fgW * origW / aw, fgH * origH / ah,
    dstX, dstY, dstW, dstH);

  // 4. 重绘 alphaMask（alpha 图本身也要同步裁剪缩放）
  const newMaskC = document.createElement('canvas');
  newMaskC.width = origW; newMaskC.height = origH;
  const maskCtx = newMaskC.getContext('2d');
  maskCtx.clearRect(0, 0, origW, origH);
  // 把 alphaMask imageData 画到临时 canvas 再裁剪
  const tmpC = document.createElement('canvas');
  tmpC.width = aw; tmpC.height = ah;
  tmpC.getContext('2d').putImageData(aData, 0, 0);
  maskCtx.drawImage(tmpC, minX, minY, fgW, fgH, dstX, dstY, dstW, dstH);

  // 5. 更新全局 srcImage
  await new Promise(resolve => {
    const newImg = new Image();
    newImg.onload = ()=>{ srcImage = newImg; resolve(); };
    newImg.src = newImgC.toDataURL();
  });

  // 6. 更新全局 alphaMask
  alphaMask = {
    imageData: newMaskC.getContext('2d').getImageData(0, 0, origW, origH),
    w: origW,
    h: origH,
  };

  clearEdgeCache();
  clearSrcPixelCache();
  clearSmallImgCache();

  const pct = Math.round(scale * 100);
  cropStatus.textContent = `✓ 主体放大 ${pct}%（${fgW}×${fgH} → ${dstW}×${dstH}）`;
  cropStatus.style.color = '#44cc44';
  document.getElementById('info-orig').textContent = `${origW} × ${origH}（主体已放大）`;
}

// 防抖处理
let processTimer = null;
function scheduleProcess(){ clearTimeout(processTimer); processTimer=setTimeout(runProcess,400); }

btnProcess.onclick = ()=>runProcess();

// ════════════════════════════════════════════════
// 自动网格寻优
// 遍历 GW=8..50，对每个尺寸：
//   1. 按图片比例计算 GH
//   2. 采样 alpha，得到前景格子集合
//   3. 找外轮廓格子（四邻域含背景）
//   4. 计算外轮廓格子平均占空率（前景像素/总像素）
// 找第一个占空率 ≥ 目标阈值的尺寸，否则取最高占空率的尺寸
// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
// Sobel 边缘图（惰性缓存，alphaMask 变化时清除）
// edgeMap[y*W + x] = 0..1，原图尺寸
// ════════════════════════════════════════════════

let _edgeCache = null; // { map: Float32Array, w, h }

function getEdgeMap(){
  if(_edgeCache) return _edgeCache;

  // 取图像数据：优先 alphaMask（用 alpha 通道），否则用原图 RGB 亮度
  let srcW, srcH, gray;
  const c = document.createElement('canvas');
  if(alphaMask){
    srcW = alphaMask.w; srcH = alphaMask.h;
    const d = alphaMask.imageData.data;
    gray = new Float32Array(srcW * srcH);
    for(let i=0; i<srcW*srcH; i++) gray[i] = d[i*4+3] / 255;
  } else if(srcImage){
    c.width = srcImage.width; c.height = srcImage.height;
    c.getContext('2d').drawImage(srcImage, 0, 0);
    const id = c.getContext('2d').getImageData(0,0,c.width,c.height);
    srcW = c.width; srcH = c.height;
    gray = new Float32Array(srcW * srcH);
    // 用 RGB 亮度（有 alpha 通道时乘以 alpha，避免透明区域产生虚假边缘）
    for(let i=0; i<srcW*srcH; i++){
      const r=id.data[i*4], g=id.data[i*4+1], b=id.data[i*4+2], a=id.data[i*4+3]/255;
      gray[i] = (0.299*r + 0.587*g + 0.114*b) / 255 * a;
    }
  } else return null;

  // Sobel 3×3
  const edge = new Float32Array(srcW * srcH);
  let maxVal = 0;
  for(let y=1; y<srcH-1; y++){
    for(let x=1; x<srcW-1; x++){
      const tl=gray[(y-1)*srcW+x-1], tm=gray[(y-1)*srcW+x], tr=gray[(y-1)*srcW+x+1];
      const ml=gray[y*srcW+x-1],                             mr=gray[y*srcW+x+1];
      const bl=gray[(y+1)*srcW+x-1], bm=gray[(y+1)*srcW+x], br=gray[(y+1)*srcW+x+1];
      const gx = -tl - 2*ml - bl + tr + 2*mr + br;
      const gy = -tl - 2*tm - tr + bl + 2*bm + br;
      const v = Math.sqrt(gx*gx + gy*gy);
      edge[y*srcW+x] = v;
      if(v > maxVal) maxVal = v;
    }
  }
  // 归一化
  if(maxVal > 0) for(let i=0; i<edge.length; i++) edge[i] /= maxVal;

  _edgeCache = { map: edge, w: srcW, h: srcH };
  return _edgeCache;
}

// 清除边缘缓存（图片/抠图更新时调用）
function clearEdgeCache(){ _edgeCache = null; }

// ════════════════════════════════════════════════
// 边缘对齐评分
// 对 gw×gh 的每条网格线（竖线 x=1..gw-1，横线 y=1..gh-1），
// 计算该线±半格宽度内的平均边缘强度（线上有边缘=对齐好）
// 减去格子内部中央区域的平均边缘强度（格内应无边缘）
// 最终分 = clamp(线上均值 - 内部均值, 0, 1)
// ════════════════════════════════════════════════

function calcEdgeAlignment(gw, gh){
  const em = getEdgeMap();
  if(!em) return 0;
  const { map, w: EW, h: EH } = em;

  const cellW = EW / gw;
  const cellH = EH / gh;
  // 半格长度（像素），边缘像素离网格线的最大可能距离
  const halfCell = Math.min(cellW, cellH) / 2;

  // 只取边缘强度 > 阈值的像素（真正的轮廓像素）
  const EDGE_THRESH = 0.25;
  let scoreSum = 0, cnt = 0;

  for(let py = 0; py < EH; py++){
    for(let px = 0; px < EW; px++){
      const e = map[py * EW + px];
      if(e < EDGE_THRESH) continue;

      // 该像素在格内的局部坐标（0 = 格左/上边线，cellW/cellH = 格右/下边线）
      const lx = (px % cellW + cellW) % cellW; // 距左侧竖线的距离
      const ly = (py % cellH + cellH) % cellH; // 距上侧横线的距离
      // 到最近竖线的距离
      const dv = Math.min(lx, cellW - lx);
      // 到最近横线的距离
      const dh = Math.min(ly, cellH - ly);
      // 取最近网格线的距离
      const d = Math.min(dv, dh);
      // 距离越小=对齐越好，归一化到 [0,1]，用边缘强度加权
      scoreSum += e * Math.max(0, 1 - d / halfCell);
      cnt += e;
    }
  }

  return cnt > 0 ? scoreSum / cnt : 0;
}

// ════════════════════════════════════════════════
// alpha 网格采样（公共基础）
// ════════════════════════════════════════════════

function getAlphaGrid(gw, gh){
  if(!alphaMask && !chkRemoveBg.checked) return null;

  if(alphaMask){
    const { imageData: aData, w: aw, h: ah } = alphaMask;
    const grid = new Float32Array(gw * gh);
    for(let gy=0; gy<gh; gy++){
      for(let gx=0; gx<gw; gx++){
        const x0=Math.floor(gx/gw*aw), x1=Math.ceil((gx+1)/gw*aw);
        const y0=Math.floor(gy/gh*ah), y1=Math.ceil((gy+1)/gh*ah);
        let sum=0, cnt=0;
        for(let py=y0; py<Math.max(y1,y0+1); py++){
          for(let px=x0; px<Math.max(x1,x0+1); px++){
            sum += aData.data[(py*aw+px)*4+3];
            cnt++;
          }
        }
        grid[gy*gw+gx] = cnt > 0 ? sum / cnt / 255 : 0;
      }
    }
    return grid;
  }

  // 备用：原图 alpha 通道
  const offC = document.createElement('canvas');
  offC.width = gw; offC.height = gh;
  const ctx = offC.getContext('2d');
  ctx.drawImage(srcImage, 0, 0, gw, gh);
  const imgD = ctx.getImageData(0, 0, gw, gh);
  const grid = new Float32Array(gw * gh);
  for(let i=0; i<gw*gh; i++) grid[i] = imgD.data[i*4+3] / 255;
  return grid;
}

// ════════════════════════════════════════════════
// 原图像素缓存（寻优用，惰性加载）
// ════════════════════════════════════════════════

let _srcPixelCache = null;

function getSrcPixels(){
  if(_srcPixelCache) return _srcPixelCache;
  if(!srcImage) return null;
  const c = document.createElement('canvas');
  c.width = srcImage.width; c.height = srcImage.height;
  c.getContext('2d').drawImage(srcImage, 0, 0);
  _srcPixelCache = { data: c.getContext('2d').getImageData(0,0,c.width,c.height).data, w: c.width, h: c.height };
  return _srcPixelCache;
}

function clearSrcPixelCache(){ _srcPixelCache = null; }

// ════════════════════════════════════════════════
// 评分专用小图缓存（最大边256px，固定计算量）
// 所有 calcGridScore 调用都基于此图，速度提升10~20倍
// ════════════════════════════════════════════════

const SCORE_MAX_DIM = 256;
let _smallImgCache = null;

function getSmallImg(){
  if(_smallImgCache) return _smallImgCache;
  if(!srcImage) return null;
  const scale = Math.min(1, SCORE_MAX_DIM / Math.max(srcImage.width, srcImage.height));
  const sw = Math.max(1, Math.round(srcImage.width  * scale));
  const sh = Math.max(1, Math.round(srcImage.height * scale));
  const c = document.createElement('canvas');
  c.width = sw; c.height = sh;
  c.getContext('2d').drawImage(srcImage, 0, 0, sw, sh);
  const id = c.getContext('2d').getImageData(0, 0, sw, sh);
  _smallImgCache = { data: id.data, w: sw, h: sh };
  return _smallImgCache;
}

function clearSmallImgCache(){ _smallImgCache = null; clearBlobCache(); }

// ════════════════════════════════════════════════
// 色块标签缓存
// 将小图每个前景像素量化到色块标签（步长32，每通道8级，最多512种色块）
// 评分时按色块独立计算，避免大色块掩盖小色块的对齐问题
// ════════════════════════════════════════════════

const BLOB_BINS = 8;               // 每通道 256/32 = 8 级
const BLOB_MAX  = BLOB_BINS ** 3;  // 512

let _blobCache = null;

function getBlobLabels(){
  if(_blobCache) return _blobCache;
  const src = getSmallImg();
  if(!src) return null;
  const { data, w: IW, h: IH } = src;
  const N = IW * IH;
  const labels = new Int16Array(N).fill(-1); // -1 = 背景
  for(let i = 0; i < N; i++){
    if(data[i*4+3] < 128) continue;
    const r = data[i*4]   >> 5; // 0~7
    const g = data[i*4+1] >> 5;
    const b = data[i*4+2] >> 5;
    labels[i] = r * BLOB_BINS * BLOB_BINS + g * BLOB_BINS + b;
  }
  _blobCache = { labels, w: IW, h: IH };
  return _blobCache;
}

function clearBlobCache(){ _blobCache = null; }

// ════════════════════════════════════════════════
// 像素风原生网格检测
//
// 像素风图片每隔固定 S 个原始像素是一个颜色均一的"元像素"块。
// 遍历 S=1..min(W,H)/4，对每个 S 把图切成 S×S 小块，
// 计算块内颜色均一度（主色像素/总像素），均一度 > PIXEL_ART_THRESH 说明找到原生尺寸。
// 基于原图计算（不降采样），保证精度。
// ════════════════════════════════════════════════

const PIXEL_ART_THRESH = 0.92; // 块内均一度阈值，>92% 认为是像素风

function detectPixelArtGrid(){
  const src = getSrcPixels();
  if(!src) return null;
  const { data, w: IW, h: IH } = src;

  const maxS = Math.floor(Math.min(IW, IH) / 4);

  for(let S = 1; S <= maxS; S++){
    // 图宽/高必须能被 S 整除（允许1像素误差）
    if(IW % S > 1 || IH % S > 1) continue;

    const bw = Math.round(IW / S); // 横向块数
    const bh = Math.round(IH / S); // 纵向块数
    if(bw < 4 || bh < 4 || bw > 100 || bh > 100) continue;

    let totalPurity = 0, validBlocks = 0;

    outer:
    for(let by = 0; by < bh; by++){
      for(let bx = 0; bx < bw; bx++){
        const x0 = bx * S, x1 = x0 + S;
        const y0 = by * S, y1 = y0 + S;

        // 统计块内颜色（量化步长8，更严格）
        const freq = {};
        let fgCount = 0;
        for(let py = y0; py < y1; py++){
          for(let px = x0; px < x1; px++){
            const idx = (py * IW + px) * 4;
            if(data[idx+3] < 128) continue;
            fgCount++;
            const qr = data[idx]   >> 3; // 步长8，32级
            const qg = data[idx+1] >> 3;
            const qb = data[idx+2] >> 3;
            const key = (qr << 10) | (qg << 5) | qb;
            freq[key] = (freq[key] || 0) + 1;
          }
        }
        if(fgCount < 1) continue;
        const maxFreq = Math.max(...Object.values(freq));
        const purity = maxFreq / fgCount;
        totalPurity += purity;
        validBlocks++;
      }
    }

    if(validBlocks === 0) continue;
    const avgPurity = totalPurity / validBlocks;
    if(avgPurity >= PIXEL_ART_THRESH){
      return { S, gw: bw, gh: bh, purity: avgPurity };
    }
  }
  return null;
}

// ════════════════════════════════════════════════
// RLE 游程评分
//
// 压缩算法的核心思想：同色格子越连续 → 游程越长 → 越"整洁"。
// 对 gw×gh 的色块标签网格，逐行+逐列扫描游程长度，
// 归一化均值越高说明同色区域越连片，网格划分越合理。
// 与"格内纯净度"互补：纯净度判断格子内部，RLE 判断格子之间。
// ════════════════════════════════════════════════

function calcRleScore(gw, gh){
  const blob = getBlobLabels();
  if(!blob) return 0;
  const { labels, w: IW, h: IH } = blob;

  // 先把小图量化标签降采样到 gw×gh 网格（每格取中心像素标签）
  const grid = new Int16Array(gw * gh).fill(-1);
  for(let gy = 0; gy < gh; gy++){
    for(let gx = 0; gx < gw; gx++){
      const cx = Math.floor((gx + 0.5) / gw * IW);
      const cy = Math.floor((gy + 0.5) / gh * IH);
      grid[gy * gw + gx] = labels[cy * IW + cx];
    }
  }

  let totalRun = 0, runCount = 0;

  // 横向扫描
  for(let gy = 0; gy < gh; gy++){
    let run = 1;
    for(let gx = 1; gx < gw; gx++){
      const cur  = grid[gy * gw + gx];
      const prev = grid[gy * gw + gx - 1];
      if(cur === prev && cur >= 0){ run++; }
      else { if(prev >= 0){ totalRun += run; runCount++; } run = 1; }
    }
    const last = grid[gy * gw + gw - 1];
    if(last >= 0){ totalRun += run; runCount++; }
  }

  // 纵向扫描
  for(let gx = 0; gx < gw; gx++){
    let run = 1;
    for(let gy = 1; gy < gh; gy++){
      const cur  = grid[gy * gw + gx];
      const prev = grid[(gy-1) * gw + gx];
      if(cur === prev && cur >= 0){ run++; }
      else { if(prev >= 0){ totalRun += run; runCount++; } run = 1; }
    }
    const last = grid[(gh-1) * gw + gx];
    if(last >= 0){ totalRun += run; runCount++; }
  }

  if(runCount === 0) return 0;
  const avgRun = totalRun / runCount;
  // 归一化：avgRun=1（完全碎）→0，avgRun≥目标值→1
  // 目标游程长度 = min(gw,gh)/4（合理的色块大小期望）
  const target = Math.max(2, Math.min(gw, gh) / 4);
  return Math.min(1, (avgRun - 1) / (target - 1));
}

// ════════════════════════════════════════════════
// 核心评分：单元格主色覆盖率
//
// 对每个格子采样原图全部像素（alpha>128 的前景像素），
// RGB 量化到 COLOR_QUANT 级后统计主色频次。
// 主色像素 / 格内前景像素 = 该格纯净度。
// 所有格子的平均纯净度 = cellPurity（越高格子划分越干净）。
// 边缘对齐作辅助分，保底 0.4。
// ════════════════════════════════════════════════

const COLOR_QUANT = 32; // RGB 量化步长
// 量化桶数 = ceil(256/32)+1 = 9，总桶数 9^3 = 729，用整数数组代替 JS 对象
const QUANT_BINS = Math.ceil(256 / COLOR_QUANT) + 1;
const QUANT_TOTAL = QUANT_BINS * QUANT_BINS * QUANT_BINS;
const _freqBuf = new Int32Array(QUANT_TOTAL); // 复用，避免 GC

// 复用缓冲：每个色块累计（格内像素数，主色像素数）
const _blobTotal   = new Float32Array(BLOB_MAX); // 该色块在所有格子中的前景像素总数
const _blobDomSum  = new Float32Array(BLOB_MAX); // 该色块"落在主色格子"的像素数之和
// 注：这里统计方式是：遍历所有格子，每格找主色，主色像素全部计入 _blobDomSum

function calcGridScore(gw, gh){
  const blob = getBlobLabels();
  if(!blob) return null;
  const { labels, w: IW, h: IH } = blob;

  const minCellPx = 2;

  // 遍历所有格子，统计每个色块被"对齐"的像素比例
  // 对于一个格子：主色是格内出现最多的色块标签
  // 主色的像素 → 贡献给该色块的 domSum
  // 格内所有前景像素 → 贡献给对应色块的 total

  // 用到的色块标签集合
  const usedBlobs = [];
  const _seen = new Uint8Array(BLOB_MAX); // 标记是否已加入 usedBlobs

  for(let gy = 0; gy < gh; gy++){
    for(let gx = 0; gx < gw; gx++){
      const x0 = Math.floor(gx / gw * IW);
      const x1 = Math.max(x0 + 1, Math.floor((gx + 1) / gw * IW));
      const y0 = Math.floor(gy / gh * IH);
      const y1 = Math.max(y0 + 1, Math.floor((gy + 1) / gh * IH));

      // 统计格内各色块频次（复用 _freqBuf）
      const usedKeys = [];
      let fgCount = 0;

      for(let py = y0; py < y1; py++){
        for(let px = x0; px < x1; px++){
          const lbl = labels[py * IW + px];
          if(lbl < 0) continue; // 背景
          fgCount++;
          if(_freqBuf[lbl] === 0) usedKeys.push(lbl);
          _freqBuf[lbl]++;
        }
      }

      if(fgCount < minCellPx){
        for(const k of usedKeys) _freqBuf[k] = 0;
        continue;
      }

      // 找主色
      let domLabel = usedKeys[0], domCount = 0;
      for(const k of usedKeys){
        if(_freqBuf[k] > domCount){ domCount = _freqBuf[k]; domLabel = k; }
      }

      // 把每个色块的像素归入 total；主色像素归入 domSum
      for(const k of usedKeys){
        const cnt = _freqBuf[k];
        _freqBuf[k] = 0;
        if(!_seen[k]){ _seen[k] = 1; usedBlobs.push(k); }
        _blobTotal[k]  += cnt;
        if(k === domLabel) _blobDomSum[k] += cnt;
      }
    }
  }

  // 按色块计算纯净率，取各色块均值
  let blobPuritySum = 0, blobCount = 0;
  for(const k of usedBlobs){
    const total = _blobTotal[k];
    if(total >= minCellPx){
      blobPuritySum += _blobDomSum[k] / total;
      blobCount++;
    }
    // 清零
    _blobTotal[k] = 0;
    _blobDomSum[k] = 0;
    _seen[k] = 0;
  }

  if(blobCount === 0) return null;

  const cellPurity = blobPuritySum / blobCount;
  const edge  = calcEdgeAlignment(gw, gh);
  const rle   = calcRleScore(gw, gh);
  // 综合分：纯净度60% + 边缘对齐20% + RLE连片度20%
  const combo = cellPurity * 0.6 + edge * 0.2 + rle * 0.2;

  return { gw, gh, cellPurity, edge, rle, combo, iou: cellPurity, purity: cellPurity, ambigCount: 0 };
}

// 从评分结果中取当前模式的主分
function primaryScore(r){
  if(r.combo !== undefined) return r.combo;
  return 0;
}

// 格式化状态栏文字
function formatScoreStatus(prefix, r){
  const cp = ((r.cellPurity ?? r.iou ?? 0)*100).toFixed(1);
  const ed = ((r.edge ?? 0)*100).toFixed(1);
  const rl = ((r.rle ?? 0)*100).toFixed(1);
  const co = ((r.combo ?? 0)*100).toFixed(1);
  return `${prefix} ${r.gw}×${r.gh}\n纯净 ${cp}%  对齐 ${ed}%  连片 ${rl}%  综合 ${co}%`;
}

// 寻最优 GH（在给定 gw 下，±10% 高度范围内遍历）
// 方案 A：对 GW×GH 能被 K×10 整除的尺寸，评分加 5% 偏好
// 对宽高比接近原图的网格加微小偏好（避免极端形变）
function findBestGH(gw){
  const imgAspect = srcImage.width / srcImage.height;
  const baseGH = Math.max(4, Math.min(100, Math.round(gw / imgAspect)));
  const ghMin = Math.max(4, Math.round(baseGH * 0.90));
  const ghMax = Math.min(100, Math.round(baseGH * 1.10));
  const K = parseInt(rngColors.value);
  let best = null, bestScore = -1;
  for(let gh=ghMin; gh<=ghMax; gh++){
    const r = calcGridScore(gw, gh);
    if(!r) continue;
    let s = primaryScore(r);
    // 整除加分
    if((gw * gh) % (K * 10) === 0) s *= 1.05;
    // 宽高比接近原图时微加分（±5%以内加1%）
    const ratio = (gw / gh) / imgAspect;
    if(ratio >= 0.95 && ratio <= 1.05) s *= 1.01;
    if(s > bestScore){ bestScore = s; best = r; }
  }
  return best || { gw, gh: baseGH, iou:0, purity:0, edge:0, combo:0, ambigCount:0 };
}

// 写入滑块并更新状态栏
function applyGridResult(r, prefix){
  rngGW.value = r.gw; valGW.textContent = r.gw;
  rngGH.value = r.gh; valGH.textContent = r.gh;
  const score = primaryScore(r);
  autoGridStatus.textContent = formatScoreStatus(prefix, r);
  autoGridStatus.style.color = score >= 0.85 ? '#44cc44' : score >= 0.65 ? '#ffaa44' : '#ff6644';
}

// ── 步进按钮 ──
function stepGrid(delta){
  const newGW = Math.max(4, Math.min(50, parseInt(rngGW.value) + delta));
  const best = findBestGH(newGW);
  applyGridResult(best, delta > 0 ? '▲' : '▼');
  runProcess();
}

// ── 全量自动寻优（三段式：粗扫→精扫→提前终止）──
// 第一段：GW 步长4粗扫（8,12,16…100），找粗最优区间
// 第二段：粗最优 GW ±4 范围精扫步长1
// 提前终止：综合分 ≥ 0.80 立即停止
const AUTO_TARGET_SCORE = 0.80;

async function runAutoGrid(){
  if(!srcImage) return;
  btnAutoGrid.disabled    = true;
  btnGridSmaller.disabled = true;
  btnGridLarger.disabled  = true;
  autoGridStatus.textContent = '检测像素风格式…';
  autoGridStatus.style.color = '#8888aa';

  // ── 像素风检测：找到原生网格就直接用，跳过全量搜索 ──
  await new Promise(r => setTimeout(r, 0)); // 让 UI 刷新
  const pixelArt = detectPixelArtGrid();
  if(pixelArt){
    const { S, gw, gh, purity } = pixelArt;
    detectedPixelSize = S; // 记录元素尺寸，runProcess 用中心像素采样
    autoGridStatus.textContent = `✦ 像素风  元素尺寸 ${S}px → ${gw}×${gh}\n格纯净 ${(purity*100).toFixed(1)}%  原生网格精确匹配`;
    autoGridStatus.style.color = '#44ccff';
    rngGW.value = gw; valGW.textContent = gw;
    rngGH.value = gh; valGH.textContent = gh;
    progressGrid.style.width = '100%';
    setTimeout(()=>{ progressGrid.style.width='0%'; }, 800);
    updateAutoGridBtn();
    runProcess();
    return;
  }
  detectedPixelSize = 0; // 非像素风，清除

  let bestResult = null, bestScore = -1;
  let coarseWinner = 8; // 粗扫最优 GW
  const allResults = []; // 收集所有候选，供 top-4 使用

  // ── 第一段：粗扫（步长4，约24次）──
  await new Promise(resolve => {
    const coarseList = [];
    for(let g = 8; g <= 100; g += 4) coarseList.push(g);
    let idx = 0;
    function step(){
      if(idx >= coarseList.length){ resolve(); return; }
      const gw = coarseList[idx++];
      const r = findBestGH(gw);
      if(r){
        allResults.push(r);
        if(r.combo > bestScore){ bestScore = r.combo; bestResult = r; coarseWinner = gw; }
      }
      progressGrid.style.width = (idx / coarseList.length * 50).toFixed(0) + '%';
      autoGridStatus.textContent = `粗扫 GW=${gw}  当前最优 ${(bestScore*100).toFixed(1)}%`;
      if(bestScore >= AUTO_TARGET_SCORE){ resolve(); return; }
      setTimeout(step, 0);
    }
    step();
  });

  // ── 第二段：精扫（粗最优 ±4 步长1，约9次，可提前终止）──
  if(bestScore < AUTO_TARGET_SCORE){
    const fineMin = Math.max(8,   coarseWinner - 4);
    const fineMax = Math.min(100, coarseWinner + 4);
    const fineList = [];
    for(let g = fineMin; g <= fineMax; g++) if(g % 4 !== 0) fineList.push(g); // 跳过粗扫已算过的
    await new Promise(resolve => {
      let idx = 0;
      function step(){
        if(idx >= fineList.length){ resolve(); return; }
        const gw = fineList[idx++];
        const r = findBestGH(gw);
        if(r){
          allResults.push(r);
          if(r.combo > bestScore){ bestScore = r.combo; bestResult = r; }
        }
        progressGrid.style.width = (50 + idx / fineList.length * 50).toFixed(0) + '%';
        autoGridStatus.textContent = `精扫 GW=${gw}  当前最优 ${(bestScore*100).toFixed(1)}%`;
        if(bestScore >= AUTO_TARGET_SCORE){ resolve(); return; }
        setTimeout(step, 0);
      }
      step();
    });
  }

  if(!bestResult){
    autoGridStatus.textContent = '未找到有效结果（请先上传图片）';
    autoGridStatus.style.color = '#ff4444';
    updateAutoGridBtn();
    progressGrid.style.width = '0%';
    return;
  }

  // 收集 top-4：综合分最高且 GW 差距 ≥ 8，保证尺寸分散
  compareTopResults = pickTop4(allResults);

  const reached = bestScore >= AUTO_TARGET_SCORE;
  applyGridResult(bestResult, reached ? '✓' : '◎');

  progressGrid.style.width = '100%';
  setTimeout(()=>{ progressGrid.style.width='0%'; }, 800);
  updateAutoGridBtn();
  runProcess();
}

// 从候选结果中选4个：综合分降序，且相邻入选项 GW 差 ≥ 8
function pickTop4(results){
  const sorted = [...results].sort((a, b) => b.combo - a.combo);
  const picked = [];
  for(const r of sorted){
    if(picked.length >= 4) break;
    if(picked.every(p => Math.abs(p.gw - r.gw) >= 8)) picked.push(r);
  }
  // 不足4个时放宽限制直接补
  if(picked.length < 4){
    for(const r of sorted){
      if(picked.length >= 4) break;
      if(!picked.includes(r)) picked.push(r);
    }
  }
  return picked;
}

// 用平均色快速渲染预览（不跑 K-Means，够快）
function renderQuickPreview(gw, gh, maxDim = 300){
  const src = getSrcPixels();
  if(!src) return null;
  const { data, w: IW, h: IH } = src;

  const scale = Math.min(maxDim / gw, maxDim / gh);
  const cellPx = Math.max(2, Math.floor(scale));
  const c = document.createElement('canvas');
  c.width = gw * cellPx; c.height = gh * cellPx;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, c.width, c.height);

  for(let gy = 0; gy < gh; gy++){
    for(let gx = 0; gx < gw; gx++){
      const x0 = Math.floor(gx / gw * IW);
      const x1 = Math.max(x0 + 1, Math.floor((gx + 1) / gw * IW));
      const y0 = Math.floor(gy / gh * IH);
      const y1 = Math.max(y0 + 1, Math.floor((gy + 1) / gh * IH));
      let r = 0, g = 0, b = 0, cnt = 0;
      for(let py = y0; py < y1; py++){
        for(let px = x0; px < x1; px++){
          const idx = (py * IW + px) * 4;
          if(data[idx+3] < 128) continue;
          r += data[idx]; g += data[idx+1]; b += data[idx+2]; cnt++;
        }
      }
      if(cnt === 0) continue;
      ctx.fillStyle = `rgb(${Math.round(r/cnt)},${Math.round(g/cnt)},${Math.round(b/cnt)})`;
      ctx.fillRect(gx * cellPx, gy * cellPx, cellPx - 1, cellPx - 1);
    }
  }
  return c;
}

// ════════════════════════════════════════════════
// 主处理流程
// ════════════════════════════════════════════════

function setProgress(pct){ progress.style.width = pct+'%'; }

function runProcess(){
  if(!srcImage) return;
  setProgress(10);

  const GW = parseInt(rngGW.value);
  const GH = parseInt(rngGH.value);
  const maxColors = parseInt(rngColors.value);
  const threshold = parseInt(rngThresh.value);

  // 1. 原图绘制（缩放显示，最大300px）
  const dispScale = Math.min(300/srcImage.width, 300/srcImage.height, 1);
  canvasOrig.width  = Math.round(srcImage.width  * dispScale);
  canvasOrig.height = Math.round(srcImage.height * dispScale);
  const ctxOrig = canvasOrig.getContext('2d');
  ctxOrig.drawImage(srcImage, 0, 0, canvasOrig.width, canvasOrig.height);

  // 2. 采样每个格子的代表色
  //    像素风模式：直接读每个元素块的中心像素，避免缩放插值混色
  //    普通模式：缩放到 GW×GH（关闭图像平滑，保证最近邻采样）
  const offscreen = document.createElement('canvas');
  offscreen.width = GW; offscreen.height = GH;
  const ctxOff = offscreen.getContext('2d');
  let pixels;
  const S = detectedPixelSize;
  if(S > 0 && srcImage.width === GW * S && srcImage.height === GH * S){
    // 像素风：从原图读每块中心像素
    const fullC = document.createElement('canvas');
    fullC.width = srcImage.width; fullC.height = srcImage.height;
    const fullCtx = fullC.getContext('2d');
    fullCtx.drawImage(srcImage, 0, 0);
    const fullData = fullCtx.getImageData(0, 0, srcImage.width, srcImage.height).data;
    const buf = new Uint8ClampedArray(GW * GH * 4);
    for(let gy = 0; gy < GH; gy++){
      for(let gx = 0; gx < GW; gx++){
        // 取该元素块的中心像素
        const cx = gx * S + Math.floor(S / 2);
        const cy = gy * S + Math.floor(S / 2);
        const si = (cy * srcImage.width + cx) * 4;
        const di = (gy * GW + gx) * 4;
        buf[di]   = fullData[si];
        buf[di+1] = fullData[si+1];
        buf[di+2] = fullData[si+2];
        buf[di+3] = fullData[si+3];
      }
    }
    pixels = buf;
  } else {
    // 普通模式：最近邻缩放（关闭平滑避免边界混色）
    ctxOff.imageSmoothingEnabled = false;
    ctxOff.drawImage(srcImage, 0, 0, GW, GH);
    pixels = ctxOff.getImageData(0, 0, GW, GH).data;
  }

  const removeBg   = chkRemoveBg.checked;
  const bgThreshold = parseInt(rngBgThresh.value);

  setProgress(25);

  // 3~4. 量化 + 颜色列表（固定色板 vs 动态 Median Cut）
  setTimeout(()=>{
    const useFixed = chkFixedPalette.checked;

    let colorHexList, colorLabList;

    if(useFixed){
      // 固定色板：对每个格子做最近邻匹配，统计各色覆盖像素数，取前 K 种
      const K = parseInt(rngFixedColors.value);
      const pixelCount = new Array(FIXED_PALETTE_HEX.length).fill(0);
      const N = GW * GH;
      for(let i = 0; i < N; i++){
        if(pixels[i*4+3] < 128) continue; // 透明像素跳过
        const lab = rgbToLab(pixels[i*4], pixels[i*4+1], pixels[i*4+2]);
        let best = Infinity, bi = 0;
        for(let ci = 0; ci < FIXED_PALETTE_LAB.length; ci++){
          const d = deltaE(lab, FIXED_PALETTE_LAB[ci]);
          if(d < best){ best = d; bi = ci; }
        }
        pixelCount[bi]++;
      }
      // 按覆盖数降序，取前 K 个有像素的颜色
      const ranked = pixelCount
        .map((cnt, ci) => ({ ci, cnt }))
        .filter(e => e.cnt > 0)
        .sort((a, b) => b.cnt - a.cnt)
        .slice(0, K);
      colorHexList = ranked.map(e => FIXED_PALETTE_HEX[e.ci]);
      colorLabList = ranked.map(e => FIXED_PALETTE_LAB[e.ci]);
      setProgress(65);
    } else {
      // 动态：Median Cut 量化 → 相似色合并
      const k = Math.min(maxColors, GW*GH);
      const { palette, assignment } = kMeansQuantize(pixels, k);
      setProgress(55);
      const { uniqueRoots, rootColors } = mergeSimilarColors(palette, assignment, threshold);
      setProgress(65);
      colorHexList = uniqueRoots.map(r => rgbHex(...rootColors[r]));
      colorLabList = uniqueRoots.map(r => rgbToLab(...rootColors[r]));
    }

    // 5. 构建 rawCells（带原始像素 Lab，供配额分配用）
    const rawCells = [];
    for(let y=0;y<GH;y++){
      for(let x=0;x<GW;x++){
        const i = y*GW+x;
        const pr=pixels[i*4], pg=pixels[i*4+1], pb=pixels[i*4+2];
        rawCells.push({ x, y, labColor: rgbToLab(pr,pg,pb) });
      }
    }

    // 6. 确定背景格子
    let bgSet = new Set();

    // 透明 PNG：alpha < 128 的格子自动视为背景
    for(let gy = 0; gy < GH; gy++){
      for(let gx = 0; gx < GW; gx++){
        if(pixels[(gy * GW + gx) * 4 + 3] < 128) bgSet.add(`${gx},${gy}`);
      }
    }

    let outlineSet = new Set(); // 描边格（keepOutline=true 时单独处理）

    if(chkOutlineMode.checked){
      // 黑色描边模式（优先级最高）
      const lThresh = parseInt(rngOutlineThresh.value);
      const keepOutline = chkKeepOutline.checked;
      const tempCells = rawCells.map(cell => {
        let best=Infinity, bi=0;
        colorLabList.forEach((lab, ci)=>{
          const d = deltaE(cell.labColor, lab);
          if(d<best){best=d;bi=ci;}
        });
        return { ...cell, colorHex: colorHexList[bi] };
      });
      const result = outlineModeBg(tempCells, GW, GH, lThresh, keepOutline);
      bgSet = result.bgSet;
      // keepOutline=true 时描边格不在 bgSet 里，单独记录
      if(keepOutline) outlineSet = result.outlineSet;
    } else if(removeBg){
      // 泛洪填充（用户手动勾选，优先于 alphaMask）
      const tempCells = rawCells.map(cell => {
        let best=Infinity, bi=0;
        colorLabList.forEach((lab, ci)=>{
          const d = deltaE(cell.labColor, lab);
          if(d<best){best=d;bi=ci;}
        });
        return { ...cell, colorHex: colorHexList[bi] };
      });
      const { bgSet: filledBgSet, labMap: floodLabMap, bgLab } = floodFillBg(tempCells, GW, GH, bgThreshold);
      bgSet = filledBgSet;

      // 边缘腐蚀：只腐蚀颜色接近背景色的边缘格
      const erodeSteps = parseInt(rngErode.value);
      const erodeThresh = bgThreshold * 1.5;
      for(let step = 0; step < erodeSteps; step++){
        const toAdd = [];
        for(let gy = 0; gy < GH; gy++){
          for(let gx = 0; gx < GW; gx++){
            if(bgSet.has(`${gx},${gy}`)) continue;
            const hasBgNeighbor = [[1,0],[-1,0],[0,1],[0,-1]].some(
              ([dx,dy]) => bgSet.has(`${gx+dx},${gy+dy}`)
            );
            if(!hasBgNeighbor) continue;
            const cellLab = floodLabMap.get(`${gx},${gy}`);
            if(cellLab && deltaE(cellLab, bgLab) <= erodeThresh) toAdd.push(`${gx},${gy}`);
          }
        }
        for(const k of toAdd) bgSet.add(k);
        if(toAdd.length === 0) break;
      }

      // 泛洪结果 → alphaMask → 触发主体放大（仅首次，防循环）
      const chkCrop = document.getElementById('chk-crop-fg');
      if(chkCrop.checked && !_floodCropDone){
        _floodCropDone = true;
        const fw = srcImage.width, fh = srcImage.height;
        const maskData = new ImageData(fw, fh);
        for(let gy = 0; gy < GH; gy++){
          for(let gx = 0; gx < GW; gx++){
            const isBg = bgSet.has(`${gx},${gy}`);
            const alpha = isBg ? 0 : 255;
            const x0 = Math.floor(gx / GW * fw), x1 = Math.ceil((gx + 1) / GW * fw);
            const y0 = Math.floor(gy / GH * fh), y1 = Math.ceil((gy + 1) / GH * fh);
            for(let py = y0; py < Math.min(y1, fh); py++){
              for(let px = x0; px < Math.min(x1, fw); px++){
                const idx = (py * fw + px) * 4;
                maskData.data[idx] = maskData.data[idx+1] = maskData.data[idx+2] = 255;
                maskData.data[idx+3] = alpha;
              }
            }
          }
        }
        alphaMask = { imageData: maskData, w: fw, h: fh };
        clearEdgeCache(); clearSrcPixelCache(); clearSmallImgCache();
        cropToForeground().then(() => runAutoGrid());
      }
    } else if(alphaMask){
      // alphaMask：透明PNG自动建立 或 remove.bg 结果
      const { imageData: aData, w: aw, h: ah } = alphaMask;
      for(let gy=0;gy<GH;gy++){
        for(let gx=0;gx<GW;gx++){
          // 取该格子对应区域的平均 alpha
          const x0=Math.floor(gx/GW*aw), x1=Math.floor((gx+1)/GW*aw);
          const y0=Math.floor(gy/GH*ah), y1=Math.floor((gy+1)/GH*ah);
          let sum=0, cnt=0;
          for(let py=y0;py<Math.max(y1,y0+1);py++){
            for(let px=x0;px<Math.max(x1,x0+1);px++){
              sum += aData.data[(py*aw+px)*4+3];
              cnt++;
            }
          }
          if(sum/cnt < 64) bgSet.add(`${gx},${gy}`); // alpha < 25% 视为背景
        }
      }
    }

    // 7. 过滤掉背景格子和描边格（描边格单独处理）
    const activeCells = rawCells.filter(c =>
      !bgSet.has(`${c.x},${c.y}`) && !outlineSet.has(`${c.x},${c.y}`)
    );

    setProgress(75);

    // 9. 分配：自由模式=纯最近邻，否则配额约束（严格10倍数）
    let finalCells;
    if(chkFreeMode.checked){
      const validHexes = colorHexList.filter(h => !excludedColors.has(h));
      const validLabs  = validHexes.map((_,i) => colorLabList[colorHexList.indexOf(validHexes[i])]);
      finalCells = activeCells.map(cell => {
        let best = Infinity, bi = 0;
        for(let ci = 0; ci < validLabs.length; ci++){
          const d = deltaE(cell.labColor, validLabs[ci]);
          if(d < best){ best = d; bi = ci; }
        }
        return { ...cell, colorHex: validHexes[bi] };
      });
    } else {
      finalCells = assignWithQuota(activeCells, colorHexList, colorLabList, excludedColors);
    }

    // 描边格强制赋黑色，合并进结果
    if(outlineSet.size > 0){
      const BLACK = '#222222';
      for(const key of outlineSet){
        const [x, y] = key.split(',').map(Number);
        finalCells.push({ x, y, colorHex: BLACK, labColor: rgbToLab(34, 34, 34) });
      }
    }

    setProgress(90);

    // 10. 统计调色板
    const paletteMap = {};
    for(const c of finalCells){
      paletteMap[c.colorHex] = (paletteMap[c.colorHex]||0)+1;
    }

    currentCells   = finalCells;
    currentPalette = paletteMap;

    // 11. 绘制像素化预览
    const PREVIEW_CELL = Math.max(4, Math.min(20, Math.floor(360/Math.max(GW,GH))));
    canvasPixel.width  = GW * PREVIEW_CELL;
    canvasPixel.height = GH * PREVIEW_CELL;
    const ctxPx = canvasPixel.getContext('2d');
    ctxPx.fillStyle = '#0d0d1a';
    ctxPx.fillRect(0,0,canvasPixel.width,canvasPixel.height);

    for(const c of finalCells){
      ctxPx.fillStyle = c.colorHex;
      ctxPx.fillRect(c.x*PREVIEW_CELL, c.y*PREVIEW_CELL, PREVIEW_CELL-1, PREVIEW_CELL-1);
    }
    // 背景格子用半透明标记（方便看轮廓）
    if(bgSet.size > 0){
      ctxPx.fillStyle = 'rgba(255,0,100,0.12)';
      for(const key of bgSet){
        const [bx,by] = key.split(',').map(Number);
        ctxPx.fillRect(bx*PREVIEW_CELL, by*PREVIEW_CELL, PREVIEW_CELL-1, PREVIEW_CELL-1);
      }
    }

    document.getElementById('info-pixel').textContent =
      `${GW} × ${GH}，${Object.keys(paletteMap).length} 色，${finalCells.length} 格` +
      (bgSet.size > 0 ? `（去除背景 ${bgSet.size} 格）` : '');

    // 9. 更新调色板 UI
    updatePaletteUI(paletteMap);

    setProgress(100);
    setTimeout(()=>setProgress(0), 600);

    btnGenerate.disabled = finalCells.length === 0;
    generatedLevel = null;
    btnSave.disabled = true;
    jsonPreview.textContent = '（点击"生成关卡 JSON"）';
  }, 0);
}

function updatePaletteUI(paletteMap){
  colorPalette.innerHTML = '';
  const warn = document.getElementById('stat-warn');
  let hasNonTen = false;

  const sorted = Object.entries(paletteMap).sort((a,b)=>b[1]-a[1]);
  for(const [hex, cnt] of sorted){
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (excludedColors.has(hex)?' excluded':'');
    sw.style.background = hex;
    sw.title = `${hex}  ×${cnt}`;
    const label = document.createElement('span');
    label.className = 'cnt';
    label.textContent = cnt;
    sw.appendChild(label);
    sw.onclick = ()=>{
      if(excludedColors.has(hex)) excludedColors.delete(hex);
      else excludedColors.add(hex);
      runProcess();
    };
    colorPalette.appendChild(sw);
    if(cnt % 10 !== 0) hasNonTen = true;
  }

  document.getElementById('stat-colors').textContent = sorted.length;
  document.getElementById('stat-cells').textContent  = Object.values(paletteMap).reduce((a,b)=>a+b,0);
  warn.style.display = (!chkFreeMode.checked && hasNonTen) ? 'flex' : 'none';
}

// ════════════════════════════════════════════════
// 生成关卡 JSON
// ════════════════════════════════════════════════

btnGenerate.onclick = ()=>{
  if(currentCells.length === 0) return;

  const GW = parseInt(rngGW.value);
  const GH = parseInt(rngGH.value);
  const numLanes = parseInt(document.getElementById('lane-count').value);

  // 按颜色分组，y 坐标翻转（canvas: 0=顶 → JSON: 0=底）
  const colorGroups = {};
  for(const c of currentCells){
    if(!colorGroups[c.colorHex]) colorGroups[c.colorHex]=[];
    colorGroups[c.colorHex].push({ x: c.x, y: (GH - 1) - c.y });
  }

  // 构建 entities
  const entities = Object.entries(colorGroups).map(([color, cells])=>({
    type: 'PixelBlock',
    color,
    cells,
  }));

  // 构建 initialTanks：弹药数 = 方块数（已保证是10的倍数）
  // 按数量降序，轮流分配到各队列
  const allTurretDefs = [];
  for(const [color, cells] of Object.entries(colorGroups)){
    allTurretDefs.push({ color, ammo: cells.length });
  }
  allTurretDefs.sort((a,b)=>{
    return colorGroups[b.color].length - colorGroups[a.color].length;
  });

  const initialTanks = [];
  // 记录每个队列当前已有的炮车数量（作为 position）
  const lanePos = new Array(numLanes).fill(0);
  allTurretDefs.forEach((def, i)=>{
    const lane = i % numLanes;
    initialTanks.push({
      color: def.color,
      ammo:  def.ammo,
      lane,
      position: lanePos[lane]++,
    });
  });

  const levelNum = parseInt(document.getElementById('level-num').value);

  generatedLevel = {
    boardWidth:  GW,
    boardHeight: GH,
    boardSize:   Math.max(GW, GH),
    numberOfLanes: numLanes,
    entities,
    initialTanks,
  };

  const jsonStr = JSON.stringify(generatedLevel, null, 2);
  jsonPreview.textContent = jsonStr.length > 4000
    ? jsonStr.slice(0, 4000) + '\n\n... (已截断，完整数据将正常保存)'
    : jsonStr;

  btnSave.disabled = false;
  saveMsg.textContent = `准备保存 level${levelNum}.json`;
  saveMsg.style.color = '#8888aa';
};

// ════════════════════════════════════════════════
// 保存关卡
// ════════════════════════════════════════════════

btnSave.onclick = async ()=>{
  if(!generatedLevel) return;
  const levelNum = parseInt(document.getElementById('level-num').value);
  const filename = `level${levelNum}.json`;
  saveMsg.textContent = '保存中...';
  saveMsg.style.color = '#8888aa';
  try{
    const res = await fetch('/api/save-level',{
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ filename, data: generatedLevel }),
    });
    const json = await res.json();
    if(json.ok){
      saveMsg.textContent = `✓ 已保存 ${filename}`;
      saveMsg.style.color = '#44cc44';
    } else {
      saveMsg.textContent = `✗ ${json.error}`;
      saveMsg.style.color = '#ff4444';
    }
  } catch(e){
    saveMsg.textContent = `✗ 网络错误：${e.message}`;
    saveMsg.style.color = '#ff4444';
  }
};
</script>
